<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>색 바꾸기</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      font-family: sans-serif;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
    }
  </style>
</head>
<body>

<button onclick="changeColor()">색 바꾸기</button>

<script>
  function changeColor() {
    const colors = ["red", "blue", "green", "yellow", "purple", "orange"];
    const random = colors[Math.floor(Math.random() * colors.length)];
    document.body.style.background = random;
  }
</script>

</body>
</html>
