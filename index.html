<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>태양 + 지구</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 태양계 전체 컨테이너 */
    .solar-system {
      position: relative;
      width: 400px;
      height: 400px;
    }

    /* 태양 */
    .sun {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, #fff7a8, #ff9f1c, #ff5a00);
      box-shadow:
        0 0 40px #ffcc33,
        0 0 80px #ff9900,
        0 0 140px #ff5500;
    }

    /* 궤도 (원) */
    .orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      transform: translate(-50%, -50%);
      border: 1px dashed rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: rotateOrbit 10s linear infinite;
    }

    /* 지구 */
    .earth {
      position: absolute;
      top: 0;
      left: 50%;
      width: 30px;
      height: 30px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, #6ec6ff, #1e88e5);
      box-shadow: 0 0 10px #4fc3f7;
    }

    /* 공전 애니메이션 */
    @keyframes rotateOrbit {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }
  </style>
</head>
<body>

<div class="solar-system">
  <div class="sun"></div>

  <div class="orbit">
    <div class="earth"></div>
  </div>
</div>

</body>
</html>
