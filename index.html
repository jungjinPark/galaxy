<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>나의 첫 번째 태양</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: sans-serif;
    }

    .sun {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        #fff7a8 0%,
        #ffd447 25%,
        #ff9f1c 50%,
        #ff5a00 75%,
        #d62800 100%
      );
      box-shadow:
        0 0 40px #ffcc33,
        0 0 90px #ff9900,
        0 0 150px #ff5500;
      animation: rotateSun 8s linear infinite, pulseSun 2s ease-in-out infinite alternate;
    }

    @keyframes rotateSun {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulseSun {
      from {
        box-shadow:
          0 0 40px #ffcc33,
          0 0 90px #ff9900,
          0 0 150px #ff5500;
      }
      to {
        box-shadow:
          0 0 70px #fff066,
          0 0 130px #ff9900,
          0 0 220px #ff4400;
      }
    }
  </style>
</head>
<body>
  <div class="sun"></div>
</body>
</html>
